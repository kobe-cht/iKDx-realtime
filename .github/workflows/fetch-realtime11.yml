name: Fetch Realtime 11 (TWN 12:00-12:09)

on:
  schedule:
    # 台灣時間 12:00 = UTC 04:00
    - cron: '0 4 * * 1-5'
    # 台灣時間 12:09 = UTC 04:09
    - cron: '9 4 * * 1-5'
  workflow_dispatch:

# 並發控制：同一時間只允許一個 fetch-realtime 工作流運行，後來的排隊等待
concurrency:
  group: fetch-realtime
  cancel-in-progress: false

jobs:
    fetch-realtime:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check if market is open
              id: market-check
              run: |
                  TW_TIME=$(TZ=Asia/Taipei date +"%H%M")
                  TW_DAY=$(TZ=Asia/Taipei date +"%u")
                  echo "Current Taiwan time: $TW_TIME"
                  echo "Current Taiwan day: $TW_DAY"
                  if [ "$TW_DAY" -gt 5 ]; then
                    echo "Weekend - market is closed"
                    echo "should_run=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  if [ "$TW_TIME" -ge 0900 ] && [ "$TW_TIME" -le 1335 ]; then
                    echo "Market is open"
                    echo "should_run=true" >> $GITHUB_OUTPUT
                  else
                    echo "Market is closed"
                    echo "should_run=false" >> $GITHUB_OUTPUT
                  fi

            - name: Fetch realtime stock data
              if: steps.market-check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
              run: node scripts/fetch-realtime.js

            - name: Commit and push changes
              if: steps.market-check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  if [ -n "$(git status --porcelain)" ]; then
                    git add public/data/
                    TW_TIME=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")
                    git commit -m "� Update realtime stock data - $TW_TIME"
                    git push
                    echo "Changes committed and pushed"
                  else
                    echo "No changes to commit"
                  fi
